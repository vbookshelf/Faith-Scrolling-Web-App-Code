    <style>
        :root {
            /* Palette: Premium Paper & Gold */
            --bg-paper: #f0f2f5;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --accent-gold: #c5a059;
            --accent-dark: #8d7039;
            --body-bg-start: #fbfbf8;
            --body-bg-end: #e8e6e1;
            --pill-bg: rgba(255, 255, 255, 0.9);
            --overlay-bg: rgba(255, 255, 255, 0.95);
            --dark-toggle-bg: rgba(255, 255, 255, 0.9);
            --verse-border: transparent;
        }

        :root.dark {
            --bg-paper: #1a1a2e;
            --text-primary: #e8e4d9;
            --text-secondary: #9a9080;
            --accent-gold: #d4af6a;
            --accent-dark: #b8943e;
            --body-bg-start: #12111a;
            --body-bg-end: #1e1c28;
            --pill-bg: rgba(30, 28, 40, 0.92);
            --overlay-bg: rgba(18, 17, 26, 0.97);
            --dark-toggle-bg: rgba(30, 28, 40, 0.92);
            --verse-border: transparent;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: var(--body-bg-end);
            background-image: radial-gradient(circle at center, var(--body-bg-start) 0%, var(--body-bg-end) 100%);
            color: var(--text-primary);
            overflow: hidden; 
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* --- The TikTok Scroll Container --- */
        .feed-container {
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .feed-container::-webkit-scrollbar { display: none; }

        /* --- Individual Screen (Verse) --- */
        .verse-screen {
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* DESKTOP PADDING */
            padding: 40px;
            position: relative;
            border-bottom: 1px solid var(--verse-border);
        }
        
        /* Accessibility Focus Ring for Verse Screen */
        .verse-screen:focus-visible {
            outline: 3px solid var(--accent-gold);
            outline-offset: -3px;
        }

        /* Inner Content Wrapper */
        .content-wrapper {
            /* DESKTOP WIDTH */
            max-width: 500px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .verse-screen.active .content-wrapper {
            opacity: 1;
            transform: translateY(0);
        }

        .cross-icon {
            color: var(--accent-gold);
            font-size: 24px;
            margin-bottom: 30px;
            opacity: 0.6;
        }

        .verse-text {
            font-family: 'Libre Baskerville', serif;
            /* DESKTOP FONT SIZE */
            font-size: 1.8rem; 
            line-height: 1.6;
            color: var(--text-primary);
            font-style: italic;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        .verse-reference {
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent-gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        .verse-reference::before {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background-color: var(--accent-gold);
            margin: 0 auto 15px auto;
        }

        /* --- Floating Header --- */
        .floating-header {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
        }

        .category-pill {
            pointer-events: auto;
            background: var(--pill-bg);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(197, 160, 89, 0.3);
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        /* Keyboard focus style for accessibility */
        .category-pill:focus-visible, 
        .overlay-option:focus-visible,
        .close-overlay:focus-visible {
            outline: 3px solid var(--accent-gold);
            outline-offset: 2px;
        }

        /* --- Dropdown Overlay --- */
        .category-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .category-overlay.open { opacity: 1; visibility: visible; }

        .overlay-option {
            font-family: 'Libre Baskerville', serif;
            font-size: 1.5rem;
            margin: 15px 0;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
            padding: 10px 20px;
        }

        .overlay-option:hover, .overlay-option.active { color: var(--accent-gold); font-style: italic; }

        .close-overlay {
            margin-top: 40px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--text-secondary);
            background: transparent;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* --- MOBILE "ZOOM" ADJUSTMENTS --- */
        @media (max-width: 600px) {
            .verse-screen {
                /* Reduce padding to use more screen width */
                padding: 15px;
            }
            
            .content-wrapper {
                /* Force content to use 92% of screen width */
                max-width: none;
                width: 92%;
            }

            .verse-text { 
                /* MUCH LARGER TEXT */
                font-size: 1.8rem; 
                line-height: 1.4;
                margin-bottom: 20px;
            }

            .verse-reference {
                font-size: 1.1rem;
            }

            .cross-icon {
                margin-bottom: 15px;
                font-size: 28px;
            }

            /* --- NEW MOBILE-ONLY HINT STYLES --- */
            .scroll-hint {
                font-size: 1.2rem;
                font-weight: 700;
                color: var(--text-secondary);
                opacity: 0.8;
            }
        }

        /* Interaction hint */
        .scroll-hint {
            color: var(--accent-gold);
            opacity: 0.6;
            animation: bounce 2s infinite;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 40px; /* Space above */
            transition: opacity 0.5s ease; /* For fade out */
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- Dark Mode Toggle --- */
        .dark-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 300;
            width: 50px;
            height: 50px;
            background-color: var(--dark-toggle-bg);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            transition: background-color 0.4s ease;
        }

        .dark-toggle:focus-visible {
            outline: 3px solid var(--accent-gold);
            outline-offset: 2px;
        }

        .dark-toggle svg {
            width: 22px;
            height: 22px;
            color: var(--text-secondary);
            transition: color 0.4s ease;
        }

        /* Lit bulb in dark mode — fill the bulb shape with accent gold */
        :root.dark .dark-toggle .icon-bulb path {
            stroke: var(--accent-gold);
        }

        /* --- Cross-page nav link (bottom-left, mirrors the bottom-right
           utility buttons) --- */
        .nav-link {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 300;
            width: 50px;
            height: 50px;
            background-color: var(--dark-toggle-bg);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            transition: background-color 0.4s ease, transform 0.2s ease;
Text-decoration: none;
        }
        .nav-link:hover {
            transform: scale(1.05);
        }
        .nav-link:focus-visible {
            outline: 3px solid var(--accent-gold);
            outline-offset: 2px;
        }
        .nav-link svg {
            width: 26px;
            height: 26px;
            color: var(--text-secondary);
        }

    </style>
</head>

        const feedContainer = document.getElementById('feed-container');
        const categoryTrigger = document.getElementById('category-trigger');
        const categoryOverlay = document.getElementById('category-overlay');
        const currentCategoryLabel = document.getElementById('current-category-label');
        const closeOverlayBtn = document.querySelector('.close-overlay');
        const options = document.querySelectorAll('.overlay-option');
        const menuOptionsContainer = document.getElementById('menu-options-container');

        let currentCategory = 'grace';
		let isLoading = false;
        let hasUserScrolled = false; 
        
        // --- Intersection Observer (Animation on Scroll) ---
        const observerOptions = {
            root: feedContainer,
            threshold: 0.5 
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                } else {
                    entry.target.classList.remove('active'); 
                }
            });
        }, observerOptions);

        // --- Core Logic: Append Verses ---
        function appendVerses(category, isFirstLoad = false) {
            const data = scriptures[category];
            
            data.forEach((item, index) => {
                const screen = document.createElement('div');
                screen.className = 'verse-screen';
                
                screen.setAttribute('role', 'article');
                screen.setAttribute('aria-label', `Scripture: ${item.reference}`);
                
                const hintHtml = (isFirstLoad && index === 0 && !hasUserScrolled) 
                    ? '<div class="scroll-hint" aria-hidden="true">Swipe Up</div>' 
                    : '';

                screen.innerHTML = `
                    <div class="content-wrapper">
                        <div class="cross-icon" aria-hidden="true">†</div>
                        <p class="verse-text">${item.verse}</p>
                        <div class="verse-reference">${item.reference}</div>
                        ${hintHtml}
                    </div>
                `;
                
                feedContainer.appendChild(screen);
                observer.observe(screen); 
            });
        }

        function renderFeed(category) {
            feedContainer.innerHTML = '';
            feedContainer.scrollTop = 0;
            appendVerses(category, true);
            appendVerses(category, false);
        }

        feedContainer.addEventListener('scroll', () => {
		    // Infinite scroll logic
		    if (feedContainer.scrollTop + feedContainer.clientHeight >= feedContainer.scrollHeight - 100) {
		        if (!isLoading) {
		            isLoading = true;
		            appendVerses(currentCategory);
		            
		            setTimeout(() => {
		                isLoading = false;
		            }, 100); 
		        }
		    }
		});

        // --- ACCESSIBILITY LOGIC ---
        
        function handleEnterSpace(e, callback) {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                callback();
            }
        }

        function openMenu() {
            categoryOverlay.classList.add('open');
            categoryTrigger.setAttribute('aria-expanded', 'true');
            
            setTimeout(() => {
                const activeOpt = document.querySelector('.overlay-option.active');
                if (activeOpt) {
                    activeOpt.focus();
                } else if (options.length > 0) {
                    options[0].focus();
                } else {
                    closeOverlayBtn.focus();
                }
            }, 305);
        }

        function closeMenu() {
            categoryOverlay.classList.remove('open');
            categoryTrigger.setAttribute('aria-expanded', 'false');
            categoryTrigger.focus();
        }

        function handleMenuNavigation(e) {
            const isArrowUp = e.key === "ArrowUp";
            const isArrowDown = e.key === "ArrowDown";
            if (!isArrowUp && !isArrowDown) return;
            e.preventDefault();
            const activeElement = document.activeElement;
            const optionsArray = Array.from(options);
            const currentIndex = optionsArray.indexOf(activeElement);
            if (currentIndex !== -1) {
                let nextIndex;
                if (isArrowDown) {
                    nextIndex = (currentIndex + 1) % optionsArray.length;
                } else {
                    nextIndex = (currentIndex - 1 + optionsArray.length) % optionsArray.length;
                }
                optionsArray[nextIndex].focus();
            } else {
                options[0].focus();
            }
        }

        // --- Event Listeners ---
        
        categoryTrigger.addEventListener('click', openMenu);
        categoryTrigger.addEventListener('keydown', (e) => handleEnterSpace(e, openMenu));

        closeOverlayBtn.addEventListener('click', closeMenu);
        
        document.addEventListener('keydown', (event) => {
            if (event.key === "Escape" && categoryOverlay.classList.contains('open')) {
                closeMenu();
            }
        });

        options.forEach(option => {
            const selectOption = () => {
                currentCategory = option.getAttribute('data-value');
                currentCategoryLabel.textContent = option.textContent;
                options.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                categoryTrigger.setAttribute('aria-label', `Current Topic: ${option.textContent}. Change Topic.`);
                renderFeed(currentCategory);
                closeMenu();
            };
            option.addEventListener('click', selectOption);
            option.addEventListener('keydown', (e) => handleEnterSpace(e, selectOption));
            option.addEventListener('keydown', handleMenuNavigation);
        });

        // --- HIDE HINT ON FIRST SCROLL ---
        const handleFirstScroll = () => {
            if (hasUserScrolled) return; // Prevent this from running more than needed
            const hint = document.querySelector('.scroll-hint');
            if (hint) {
                hint.style.opacity = '0';
            }
            hasUserScrolled = true;
        };
        
        feedContainer.addEventListener('scroll', handleFirstScroll);
        
        // --- DARK MODE TOGGLE ---
        const darkToggle = document.getElementById('dark-toggle');
        const root = document.documentElement;

        // Respect system preference on first load
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const savedTheme = localStorage.getItem('faithscrolling-theme');

        function applyTheme(dark) {
            root.classList.toggle('dark', dark);
            darkToggle.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
        }

        applyTheme(savedTheme === 'dark' || (!savedTheme && prefersDark));

        darkToggle.addEventListener('click', () => {
            const isDark = !root.classList.contains('dark');
            applyTheme(isDark);
            localStorage.setItem('faithscrolling-theme', isDark ? 'dark' : 'light');
        });

        darkToggle.addEventListener('keydown', (e) => handleEnterSpace(e, () => darkToggle.click()));

        // --- INITIALIZATION ---
        renderFeed(currentCategory);

    </script>
	
</body>
</html>
